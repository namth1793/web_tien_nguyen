[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION   = "20"
  NPM_FLAGS      = "--legacy-peer-deps"

# Next.js plugin — handles SSR, API routes, image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects: all unmatched → Next.js handler (handled by plugin, kept for safety)
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200
